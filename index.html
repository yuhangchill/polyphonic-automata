<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polyphonic Automata - Spatial Audio Prototyper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage">
      <canvas
        id="lifeCanvas"
        width="600"
        height="400"
        aria-label="Conway cellular automata grid"
      ></canvas>

      <section class="top-overlay" aria-label="Project status">
        <header>
          <h1>Polyphonic Automata</h1>
          <p class="subtitle">System Architecture / Module 01: Visual to Spatial Router</p>
          <a
            class="repo-link"
            href="https://github.com/yuhangchill/polyphonic-automata"
            aria-label="GitHub repository"
            target="_blank"
            rel="noreferrer"
          >
            <svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16">
              <path
                fill="currentColor"
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
              />
            </svg>
          </a>
        </header>

        <div class="status-bar" aria-live="polite">
          <span id="generationReadout">Frame: 0</span>
          <span id="blobReadout">Active Audio Nodes: 0</span>
        </div>
      </section>

      <section class="controls-grid" aria-label="Playback and view controls">
        <div class="panel-section">
          <span class="section-label">Playback Controls</span>
          <div class="button-group">
            <button id="runToggle" type="button">Pause</button>
            <button id="stepButton" type="button">Step</button>
            <button id="clear" type="button">Clear</button>
            <button id="randomize" type="button">Randomize</button>
            <button id="audioToggle" type="button">Audio</button>
          </div>
        </div>

        <div class="panel-section">
          <span class="section-label">Data View Mode</span>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="viewMode" value="raw" checked />
              <span>[01] Raw</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="viewMode" value="tail" />
              <span>[02] Tail</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="viewMode" value="blob" />
              <span>[03] Blob</span>
            </label>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
